calibre-backend:
    image: linuxserver/calibre
    # ... 保持你原有的配置不变 ...
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Asia/Shanghai
      - QT_SCALE_FACTOR=1.5     # 👈 核心注入 1：强制 Calibre 使用的 Qt5 框架整体放大 1.5 倍
      - QT_AUTO_SCREEN_SCALE_FACTOR=0 # 防止 Qt 盲目自适应导致冲突
    # ... 其余网络和设备透传保持原样 ...
