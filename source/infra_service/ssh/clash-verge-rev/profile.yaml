# 监听端口
port: 7890
socks-port: 7891
# 开启 TUN 模式
tun:
  enable: true
  stack: system # 或者 gvisor
  auto-route: true
  auto-detect-interface: true

proxies:
  - name: "My-SSH-Tunnel"
    type: socks5
    server: 127.0.0.1
    port: 1080

proxy-groups:
  - name: "Proxy"
    type: select
    proxies:
      - "My-SSH-Tunnel"

rules:
  - MATCH,Proxy
